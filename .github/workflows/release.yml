name: Release candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Candidate version
        required: true
      source_sha:
        description: Full source SHA from a successful Main candidate run
        required: true
      candidate_run_id:
        description: Successful Main candidate workflow run ID
        required: true

permissions:
  contents: read
  actions: read
  packages: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  LOGION_BACKUP_SECRET_SOURCE: /tmp/logion-backup-ci.key

jobs:
  rc:
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Validate requested Main candidate run
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9A-Za-z][0-9A-Za-z._-]{0,63}$ ]] \
            || ! [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] \
            || ! [[ "$CANDIDATE_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo '::error title=Invalid candidate input::Use a bounded version, full lowercase Git SHA and numeric Main run ID.'
            exit 1
          fi
          response="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${CANDIDATE_RUN_ID}")"
          if ! jq -e --arg source_sha "$SOURCE_SHA" '
            .head_sha == $source_sha
            and .head_branch == "main"
            and .conclusion == "success"
            and .path == ".github/workflows/main.yml"
          ' <<<"$response" >/dev/null; then
            echo '::error title=Untrusted candidate::The run must be a successful Main candidate for this source SHA.'
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
      - uses: actions/download-artifact@v6
        with:
          name: phase0-candidate-evidence-${{ inputs.source_sha }}
          path: candidate-evidence
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.candidate_run_id }}
      - uses: pnpm/action-setup@v5
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.29
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --group dev --frozen
      - run: pnpm ci:fast
      - name: Install release browser engines
        run: pnpm exec playwright install --with-deps chromium firefox webkit
      - name: Verify candidate manifest against checked-out source
        run: |
          uv run --group dev python scripts/release/candidate_manifest.py verify \
            --manifest candidate-evidence/candidate/candidate-manifest.json \
            --expected-commit "${{ inputs.source_sha }}" \
            --expected-repository "$GITHUB_REPOSITORY"
      - name: Load digest-pinned image references
        env:
          MANIFEST: candidate-evidence/candidate/candidate-manifest.json
        run: |
          echo "LOGION_WEB_IMAGE=$(jq -r '.images.web.reference' "$MANIFEST")" >> "$GITHUB_ENV"
          echo "LOGION_API_IMAGE=$(jq -r '.images.api.reference' "$MANIFEST")" >> "$GITHUB_ENV"
          echo "LOGION_WORKER_IMAGE=$(jq -r '.images.worker.reference' "$MANIFEST")" >> "$GITHUB_ENV"
          echo "LOGION_BACKUP_IMAGE=$(jq -r '.images.backup.reference' "$MANIFEST")" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create ephemeral backup encryption key
        run: |
          printf '%s' 'Y2ktYmFja3VwLWVuY3J5cHRpb24ta2V5LTMyYnl0ZSE' > "$LOGION_BACKUP_SECRET_SOURCE"
          sudo chown 70:70 "$LOGION_BACKUP_SECRET_SOURCE"
          sudo chmod 400 "$LOGION_BACKUP_SECRET_SOURCE"
      - name: Pull and smoke the unchanged candidate
        env:
          POSTGRES_PASSWORD: phase0-release
          LOGION_VERSION: ${{ inputs.version }}
          LOGION_SECRET_KEY: ${{ inputs.source_sha }}
          LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: |
          docker compose pull web api worker backup
          docker compose up --no-build --wait --timeout 180
          curl --fail http://localhost:8080/healthz
          curl --fail http://localhost:8080/health
      - name: Empty-environment recovery rehearsal
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          POSTGRES_PASSWORD: phase0-release
          LOGION_VERSION: ${{ inputs.version }}
          LOGION_SECRET_KEY: ${{ inputs.source_sha }}
          LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: scripts/release/rc_recovery.sh reports/release
      - name: Old-client and restored-epoch compatibility
        run: |
          mkdir -p reports/release
          pnpm --dir packages/offline exec vitest run \
            tests/bootstrap.test.ts tests/sync-client.test.ts \
            --reporter=json \
            --outputFile=../../reports/release/offline-compatibility.json
      - name: Browser, PWA and automated WCAG gate
        env:
          LOGION_E2E_BASE_URL: http://127.0.0.1:8080
        run: pnpm test:browser
      - name: Capture evidence
        if: ${{ always() && hashFiles('compose.yaml') != '' }}
        env:
          POSTGRES_PASSWORD: phase0-release
          LOGION_SECRET_KEY: ${{ inputs.source_sha }}
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: docker compose ps > release-compose-status.txt
      - if: ${{ always() && hashFiles('compose.yaml') != '' }}
        env:
          POSTGRES_PASSWORD: phase0-release
          LOGION_SECRET_KEY: ${{ inputs.source_sha }}
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: docker compose down --volumes
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: release-candidate-${{ inputs.version }}-${{ inputs.source_sha }}
          path: |
            release-compose-status.txt
            reports/browser
            reports/release
            candidate-evidence/candidate/candidate-manifest.json
            packages/contracts/openapi/openapi.json
          retention-days: 90
