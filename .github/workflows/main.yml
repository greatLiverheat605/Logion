name: Main candidate

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

env:
  NEXT_TELEMETRY_DISABLED: "1"
  LOGION_SECRET_KEY: ${{ github.sha }}
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/greatliverheat605/logion

concurrency:
  group: main-candidate
  cancel-in-progress: false

jobs:
  candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v5
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.29
          python-version: "3.12"
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --group dev --frozen
      - run: pnpm ci:fast
      - name: Production dependency license policy
        run: |
          mkdir -p security-reports
          pnpm licenses list --json --prod > security-reports/pnpm-licenses.json
          uv run --isolated --no-dev --all-packages python scripts/security/license_policy.py \
            --policy config/security/license-policy.json \
            --pnpm-json security-reports/pnpm-licenses.json \
            --output security-reports/license-policy.json
          rm security-reports/pnpm-licenses.json
      - name: Validate Compose
        env:
          POSTGRES_PASSWORD: phase0-ci-only
          LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: docker compose config --quiet
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push web candidate
        id: web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
          provenance: mode=max
          sbom: true
      - name: Build and push API candidate
        id: api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          provenance: mode=max
          sbom: true
      - name: Build and push worker candidate
        id: worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }}
          provenance: mode=max
          sbom: true
      - name: Build and push backup candidate
        id: backup
        uses: docker/build-push-action@v6
        with:
          context: infra/backup
          file: infra/backup/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-backup:${{ github.sha }}
          provenance: mode=max
          sbom: true
      - uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}-web
          subject-digest: ${{ steps.web.outputs.digest }}
          push-to-registry: true
      - uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}-api
          subject-digest: ${{ steps.api.outputs.digest }}
          push-to-registry: true
      - uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}-worker
          subject-digest: ${{ steps.worker.outputs.digest }}
          push-to-registry: true
      - uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}-backup
          subject-digest: ${{ steps.backup.outputs.digest }}
          push-to-registry: true
      - name: Generate immutable candidate manifest
        env:
          WEB_DIGEST: ${{ steps.web.outputs.digest }}
          API_DIGEST: ${{ steps.api.outputs.digest }}
          WORKER_DIGEST: ${{ steps.worker.outputs.digest }}
          BACKUP_DIGEST: ${{ steps.backup.outputs.digest }}
        run: |
          generated_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          uv run --group dev python scripts/release/candidate_manifest.py generate \
            --source-commit "$GITHUB_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --generated-at "$generated_at" \
            --image "web=${IMAGE_PREFIX}-web@${WEB_DIGEST}" \
            --image "api=${IMAGE_PREFIX}-api@${API_DIGEST}" \
            --image "worker=${IMAGE_PREFIX}-worker@${WORKER_DIGEST}" \
            --image "backup=${IMAGE_PREFIX}-backup@${BACKUP_DIGEST}" \
            --output candidate/candidate-manifest.json
          uv run --group dev python scripts/release/candidate_manifest.py verify \
            --manifest candidate/candidate-manifest.json \
            --expected-commit "$GITHUB_SHA" \
            --expected-repository "$GITHUB_REPOSITORY"
      - name: Smoke exact candidate images
        env:
          POSTGRES_PASSWORD: phase0-ci-only
          LOGION_WEB_IMAGE: ${{ env.IMAGE_PREFIX }}-web@${{ steps.web.outputs.digest }}
          LOGION_API_IMAGE: ${{ env.IMAGE_PREFIX }}-api@${{ steps.api.outputs.digest }}
          LOGION_WORKER_IMAGE: ${{ env.IMAGE_PREFIX }}-worker@${{ steps.worker.outputs.digest }}
          LOGION_BACKUP_IMAGE: ${{ env.IMAGE_PREFIX }}-backup@${{ steps.backup.outputs.digest }}
          LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: |
          docker compose up --no-build --wait --timeout 180 web api worker reverse-proxy
          curl --fail --silent http://localhost:8080/healthz
          curl --fail --silent http://localhost:8080/health
          docker compose exec -T api alembic -c apps/api/alembic.ini upgrade head
          uv run --group dev python scripts/performance/api_smoke.py \
            --base-url http://localhost:8080 \
            --requests 200 \
            --concurrency 10 \
            --threshold-ms 500 \
            --output candidate/performance-smoke.json
      - name: Capture failed candidate logs
        if: failure()
        env:
          POSTGRES_PASSWORD: phase0-ci-only
          LOGION_WEB_IMAGE: ${{ env.IMAGE_PREFIX }}-web@${{ steps.web.outputs.digest }}
          LOGION_API_IMAGE: ${{ env.IMAGE_PREFIX }}-api@${{ steps.api.outputs.digest }}
          LOGION_WORKER_IMAGE: ${{ env.IMAGE_PREFIX }}-worker@${{ steps.worker.outputs.digest }}
          LOGION_BACKUP_IMAGE: ${{ env.IMAGE_PREFIX }}-backup@${{ steps.backup.outputs.digest }}
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: docker compose logs --no-color web api worker reverse-proxy | tee candidate-failure.log
      - name: Stop candidate environment
        if: always()
        env:
          POSTGRES_PASSWORD: phase0-ci-only
          LOGION_WEB_IMAGE: ${{ env.IMAGE_PREFIX }}-web@${{ steps.web.outputs.digest }}
          LOGION_API_IMAGE: ${{ env.IMAGE_PREFIX }}-api@${{ steps.api.outputs.digest }}
          LOGION_WORKER_IMAGE: ${{ env.IMAGE_PREFIX }}-worker@${{ steps.worker.outputs.digest }}
          LOGION_BACKUP_IMAGE: ${{ env.IMAGE_PREFIX }}-backup@${{ steps.backup.outputs.digest }}
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: docker compose down --volumes --remove-orphans
      - uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.70.0
          cache: true
      - name: Verify provenance and scan exact candidate
        env:
          GH_TOKEN: ${{ github.token }}
          WEB_DIGEST: ${{ steps.web.outputs.digest }}
          API_DIGEST: ${{ steps.api.outputs.digest }}
          WORKER_DIGEST: ${{ steps.worker.outputs.digest }}
          BACKUP_DIGEST: ${{ steps.backup.outputs.digest }}
        run: |
          uv run --group dev python scripts/security/candidate_security.py \
            --repository "$GITHUB_REPOSITORY" \
            --reports-dir security-reports \
            --verify-attestations \
            --image "web=${IMAGE_PREFIX}-web@${WEB_DIGEST}" \
            --image "api=${IMAGE_PREFIX}-api@${API_DIGEST}" \
            --image "worker=${IMAGE_PREFIX}-worker@${WORKER_DIGEST}" \
            --image "backup=${IMAGE_PREFIX}-backup@${BACKUP_DIGEST}"
      - uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('security-reports/sarif/filesystem.sarif') != '' }}
        with:
          sarif_file: security-reports/sarif/filesystem.sarif
          category: candidate-filesystem
      - uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('security-reports/sarif/iac.sarif') != '' }}
        with:
          sarif_file: security-reports/sarif/iac.sarif
          category: candidate-iac
      - uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('security-reports/sarif/image-api.sarif') != '' }}
        with:
          sarif_file: security-reports/sarif/image-api.sarif
          category: candidate-image-api
      - uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('security-reports/sarif/image-backup.sarif') != '' }}
        with:
          sarif_file: security-reports/sarif/image-backup.sarif
          category: candidate-image-backup
      - uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('security-reports/sarif/image-web.sarif') != '' }}
        with:
          sarif_file: security-reports/sarif/image-web.sarif
          category: candidate-image-web
      - uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('security-reports/sarif/image-worker.sarif') != '' }}
        with:
          sarif_file: security-reports/sarif/image-worker.sarif
          category: candidate-image-worker
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: candidate-security-${{ github.sha }}
          path: security-reports
          retention-days: 90
      - uses: anchore/sbom-action@v0.22.1
        with:
          path: .
          format: spdx-json
          output-file: logion-sbom.spdx.json
      - uses: actions/upload-artifact@v6
        with:
          name: phase0-candidate-evidence-${{ github.sha }}
          path: |
            logion-sbom.spdx.json
            candidate/candidate-manifest.json
            candidate/performance-smoke.json
            security-reports/candidate-security-summary.json
            security-reports/license-policy.json
            packages/contracts/openapi/openapi.json
          retention-days: 30
