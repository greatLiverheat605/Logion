name: PR checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.29
          python-version: "3.12"
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --group dev --frozen
      - name: JavaScript dependency audit
        run: pnpm audit --audit-level high
      - name: Python dependency audit
        run: uv run --group dev pip-audit
      - name: Production dependency license policy
        run: |
          mkdir -p reports/security
          pnpm licenses list --json --prod > reports/security/pnpm-licenses.json
          uv run --isolated --no-dev --all-packages python scripts/security/license_policy.py \
            --policy config/security/license-policy.json \
            --pnpm-json reports/security/pnpm-licenses.json \
            --output reports/security/license-policy.json
          rm reports/security/pnpm-licenses.json
      - run: pnpm ci:fast
      - name: OpenAPI compatibility
        shell: bash
        run: |
          if git cat-file -e "origin/${{ github.base_ref }}:packages/contracts/openapi/openapi.json" 2>/dev/null; then
            mkdir -p reports
            git show "origin/${{ github.base_ref }}:packages/contracts/openapi/openapi.json" > reports/openapi-base.json
            node scripts/check-openapi-breaking.mjs reports/openapi-base.json packages/contracts/openapi/openapi.json
          fi
      - name: Secret history scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
      - name: Filesystem vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: pr-security-${{ github.event.pull_request.number || github.sha }}
          path: reports/security
          retention-days: 30

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17.7-alpine
        env:
          POSTGRES_DB: logion_test
          POSTGRES_USER: logion
          POSTGRES_PASSWORD: logion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U logion -d logion_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8.6.1-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      LOGION_DATABASE_URL: postgresql+asyncpg://logion:logion_test@localhost:5432/logion_test
      LOGION_REDIS_URL: redis://localhost:6379/0
      LOGION_ALLOWED_ORIGINS: '["http://test"]'
      LOGION_SECRET_KEY: phase1-integration-secret-key-must-be-at-least-32
      LOGION_WEBAUTHN_RP_ID: test
      LOGION_WEBAUTHN_ORIGINS: '["http://test"]'
      LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
      LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
      LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
      LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
      LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
      LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
      LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
      LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.29
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-packages --group dev --frozen
      - name: Infrastructure configuration
        env:
          POSTGRES_PASSWORD: logion_test
        run: |
          docker compose config --quiet
          docker run --rm \
            --add-host web:127.0.0.1 \
            --add-host api:127.0.0.1 \
            -v "$PWD/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            nginx:1.29.6-alpine nginx -t
      - name: Build affected Web image
        env:
          POSTGRES_PASSWORD: logion_test
        run: docker compose build web
      - name: Migration round trip
        run: |
          uv run --package logion-api alembic -c apps/api/alembic.ini upgrade head
          uv run --package logion-api alembic -c apps/api/alembic.ini check
          uv run --package logion-api alembic -c apps/api/alembic.ini downgrade base
          uv run --package logion-api alembic -c apps/api/alembic.ini upgrade 0004_totp
          uv run --package logion-api python scripts/verify-workspace-backfill.py seed
          uv run --package logion-api alembic -c apps/api/alembic.ini upgrade head
          uv run --package logion-api python scripts/verify-workspace-backfill.py verify
          uv run --package logion-api alembic -c apps/api/alembic.ini check
          uv run --package logion-api alembic -c apps/api/alembic.ini downgrade base
          uv run --package logion-api alembic -c apps/api/alembic.ini upgrade head
      - run: uv run --group dev pytest -m integration apps/api/tests apps/worker/tests
