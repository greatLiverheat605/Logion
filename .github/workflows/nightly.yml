name: Nightly assurance

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  POSTGRES_PASSWORD: phase0-nightly

jobs:
  assurance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.29
          python-version: "3.12"
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --group dev --frozen
      - run: pnpm ci:fast
      - run: pnpm audit --audit-level high
      - run: uv run --group dev pip-audit
      - name: Compose smoke
        run: |
          docker compose up --build -d web api worker postgres redis reverse-proxy
          for attempt in $(seq 1 18); do
            if curl --fail --silent http://localhost:8080/healthz >/dev/null \
              && curl --fail --silent http://localhost:8080/health >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          docker compose ps
          docker compose logs --no-color web api worker reverse-proxy
          exit 1
      - if: always()
        run: docker compose down --volumes
