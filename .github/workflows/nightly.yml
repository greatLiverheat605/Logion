name: Nightly assurance

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  POSTGRES_PASSWORD: phase0-nightly
  LOGION_BACKUP_SECRET_SOURCE: /tmp/logion-backup-ci.key

jobs:
  assurance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Create ephemeral backup encryption key
        run: |
          printf '%s' 'Y2ktYmFja3VwLWVuY3J5cHRpb24ta2V5LTMyYnl0ZSE' > "$LOGION_BACKUP_SECRET_SOURCE"
          sudo chown 70:70 "$LOGION_BACKUP_SECRET_SOURCE"
          sudo chmod 400 "$LOGION_BACKUP_SECRET_SOURCE"
      - uses: pnpm/action-setup@v5
        with:
          version: 11.9.0
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.29
          python-version: "3.12"
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --group dev --frozen
      - run: pnpm ci:fast
      - name: Install assurance browser engines
        run: pnpm exec playwright install --with-deps chromium firefox webkit
      - run: pnpm audit --audit-level high
      - run: uv run --group dev pip-audit
      - name: Production dependency license policy
        run: |
          mkdir -p reports/security
          pnpm licenses list --json --prod > reports/security/pnpm-licenses.json
          uv run --isolated --no-dev --all-packages python scripts/security/license_policy.py \
            --policy config/security/license-policy.json \
            --pnpm-json reports/security/pnpm-licenses.json \
            --output reports/security/license-policy.json
          rm reports/security/pnpm-licenses.json
      - name: Compose smoke
        env:
          LOGION_SECRET_KEY: ${{ github.sha }}
          LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: |
          docker compose up --build -d web api worker postgres redis reverse-proxy
          for attempt in $(seq 1 18); do
            if curl --fail --silent http://localhost:8080/healthz >/dev/null \
              && curl --fail --silent http://localhost:8080/health >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          docker compose ps
          docker compose logs --no-color web api worker reverse-proxy
          exit 1
      - name: Migration and empty-environment restore
        env:
          LOGION_SECRET_KEY: ${{ github.sha }}
          LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: |
          docker compose exec -T api alembic -c apps/api/alembic.ini upgrade head
          docker compose exec -T postgres psql -U logion -d logion -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO users (id,email,email_normalized,status,version,created_at,updated_at)
          VALUES ('00000000-0000-7000-8000-000000000001','restore@example.invalid','restore@example.invalid','active',1,now(),now());
          INSERT INTO workspaces (id,name,status,version,created_by,created_at,updated_at)
          VALUES ('00000000-0000-7000-8000-000000000002','Restore fixture','active',1,'00000000-0000-7000-8000-000000000001',now(),now());
          INSERT INTO workspace_memberships (id,workspace_id,user_id,role,status,version,joined_at,created_at,updated_at)
          VALUES ('00000000-0000-7000-8000-000000000003','00000000-0000-7000-8000-000000000002','00000000-0000-7000-8000-000000000001','owner','active',1,now(),now(),now());
          INSERT INTO workspace_sync_states (workspace_id,sync_epoch,last_sequence,min_retained_sequence,snapshot_schema_version,created_at,updated_at)
          VALUES ('00000000-0000-7000-8000-000000000002','00000000-0000-7000-8000-000000000004',0,0,1,now(),now());
          SQL
          docker compose build backup
          source_attachments="$RUNNER_TEMP/logion-source-attachments"
          mkdir -p "$source_attachments"
          printf '%s' 'phase5-attachment-marker' > "$source_attachments/restore-marker.txt"
          docker compose run --name logion-backup-tools -d --entrypoint sh \
            -v "$source_attachments:/attachments:ro" backup -c 'sleep 600'
          backup_container="logion-backup-tools"
          if ! docker exec "$backup_container" test -r /run/secrets/logion_backup_key; then
            echo '::error title=Backup secret mount unreadable::The postgres user cannot read the mounted backup key.'
            exit 1
          fi
          docker exec -e LOGION_BACKUP_ONCE=true "$backup_container" logion-backup
          latest="$(docker exec "$backup_container" sh -c 'find /backups -type f -name "logion-*.backup" | sort | tail -n 1')"
          test -n "$latest"
          docker exec "$backup_container" logion-verify-backup "$latest"
          docker compose exec -T postgres createdb -U logion logion_restore
          docker exec "$backup_container" logion-restore-backup \
            "$latest" logion_restore /tmp/logion-restore-attachments
          source_version="$(docker compose exec -T postgres \
            psql -U logion -d logion -Atc 'SELECT version_num FROM alembic_version')"
          restored_version="$(docker compose exec -T postgres \
            psql -U logion -d logion_restore -Atc 'SELECT version_num FROM alembic_version')"
          test -n "$source_version"
          test -n "$restored_version"
          if [ "$restored_version" != "$source_version" ]; then
            echo "::error title=Restore migration mismatch::Source is $source_version; restored is $restored_version"
            exit 1
          fi
          source_epoch="$(docker compose exec -T postgres psql -U logion -d logion -Atc \
            "SELECT sync_epoch FROM workspace_sync_states WHERE workspace_id='00000000-0000-7000-8000-000000000002'")"
          restored_epoch="$(docker compose exec -T postgres psql -U logion -d logion_restore -Atc \
            "SELECT sync_epoch FROM workspace_sync_states WHERE workspace_id='00000000-0000-7000-8000-000000000002'")"
          test -n "$source_epoch"
          test -n "$restored_epoch"
          test "$source_epoch" != "$restored_epoch"
          restored_workspaces="$(docker compose exec -T postgres \
            psql -U logion -d logion_restore -Atc 'SELECT count(*) FROM workspaces')"
          test "$restored_workspaces" = "1"
          restored_marker="$(docker exec "$backup_container" \
            sh -c 'cat /tmp/logion-restore-attachments/restore-marker.txt')"
          test "$restored_marker" = "phase5-attachment-marker"
      - name: Browser, PWA and automated WCAG assurance
        env:
          LOGION_E2E_BASE_URL: http://127.0.0.1:8080
        run: pnpm test:browser
      - if: always()
        env:
          LOGION_SECRET_KEY: ${{ github.sha }}
          LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: docker compose down --volumes --remove-orphans
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: nightly-security-${{ github.sha }}
          path: reports/security
          retention-days: 90
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: nightly-browser-${{ github.sha }}
          path: reports/browser
          retention-days: 90
