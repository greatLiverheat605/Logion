name: Nightly assurance

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  assurance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.29
          python-version: "3.12"
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --group dev --frozen
      - run: pnpm ci:fast
      - run: pnpm audit --audit-level high
      - run: uv run --group dev pip-audit
      - name: Compose smoke
        env:
          POSTGRES_PASSWORD: phase0-nightly
        run: |
          docker compose up --build --wait --timeout 180 web api worker postgres redis reverse-proxy
          curl --fail http://localhost:8080/healthz
          curl --fail http://localhost:8080/health
      - if: always()
        run: docker compose down --volumes
