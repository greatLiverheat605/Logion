name: Nightly assurance

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  POSTGRES_PASSWORD: phase0-nightly

jobs:
  assurance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.29
          python-version: "3.12"
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --group dev --frozen
      - run: pnpm ci:fast
      - run: pnpm audit --audit-level high
      - run: uv run --group dev pip-audit
      - name: Compose smoke
        env:
          LOGION_SECRET_KEY: ${{ github.sha }}
          LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: |
          docker compose up --build -d web api worker postgres redis reverse-proxy
          for attempt in $(seq 1 18); do
            if curl --fail --silent http://localhost:8080/healthz >/dev/null \
              && curl --fail --silent http://localhost:8080/health >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          docker compose ps
          docker compose logs --no-color web api worker reverse-proxy
          exit 1
      - name: Migration and empty-environment restore
        env:
          LOGION_SECRET_KEY: ${{ github.sha }}
          LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: |
          docker compose exec -T api alembic -c apps/api/alembic.ini upgrade head
          docker compose up --build -d backup
          latest=""
          for attempt in $(seq 1 12); do
            latest="$(docker compose exec -T backup sh -c 'find /backups -type f -name "logion-*.dump" | sort | tail -n 1')"
            if [ -n "$latest" ]; then
              break
            fi
            sleep 5
          done
          test -n "$latest"
          docker compose exec -T backup logion-verify-backup "$latest"
          docker compose exec -T postgres createdb -U logion logion_restore
          docker compose exec -T backup pg_restore \
            --exit-on-error \
            --no-owner \
            --no-privileges \
            --dbname=logion_restore \
            "$latest"
          source_version="$(docker compose exec -T postgres \
            psql -U logion -d logion -Atc 'SELECT version_num FROM alembic_version')"
          restored_version="$(docker compose exec -T postgres \
            psql -U logion -d logion_restore -Atc 'SELECT version_num FROM alembic_version')"
          test -n "$source_version"
          test -n "$restored_version"
          if [ "$restored_version" != "$source_version" ]; then
            echo "::error title=Restore migration mismatch::Source is $source_version; restored is $restored_version"
            exit 1
          fi
      - if: always()
        env:
          LOGION_SECRET_KEY: ${{ github.sha }}
          LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_TOTP_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktaW50ZWdyYXRpb24tdG90cC1rZXktMzJieXRlcyE"}'
          LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZW1haWwtZGVsaXZlcnkta2V5LTMyLWJ5dGVzISE"}'
          LOGION_AI_CREDENTIAL_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_AI_CREDENTIAL_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktYWktY3JlZGVudGlhbC1rZXktMzItYnl0ZXMhISE"}'
          LOGION_DATA_EXPORT_ACTIVE_ENCRYPTION_KEY_ID: ci-v1
          LOGION_DATA_EXPORT_ENCRYPTION_KEYS: '{"ci-v1":"Y2ktZGF0YS1leHBvcnQta2V5LTMyLWJ5dGVzISEhISE"}'
        run: docker compose down --volumes
