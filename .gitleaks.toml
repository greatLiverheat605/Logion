title = "Logion secret scanning configuration"

[extend]
useDefault = true

[allowlist]
description = "Known non-production credentials used only by isolated CI services"
regexTarget = "match"
regexes = [
  '''POSTGRES_PASSWORD:\s+phase0-nightly''',
  '''LOGION_SECRET_KEY:\s+phase1-integration-secret-key-must-be-at-least-32''',
]
