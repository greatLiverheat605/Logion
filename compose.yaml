name: logion

services:
  postgres:
    image: postgres:17.7-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-logion}
      POSTGRES_USER: ${POSTGRES_USER:-logion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]
    restart: unless-stopped

  redis:
    image: redis:8.6.1-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      LOGION_ENV: ${LOGION_ENV:-development}
      LOGION_VERSION: ${LOGION_VERSION:-0.1.0}
      LOGION_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-logion}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-logion}
      LOGION_REDIS_URL: redis://redis:6379/0
      LOGION_ALLOWED_ORIGINS: ${LOGION_ALLOWED_ORIGINS:-["http://localhost:3000"]}
      LOGION_HEALTHCHECK_DEPENDENCIES: "true"
      LOGION_SECRET_KEY: ${LOGION_SECRET_KEY:?set LOGION_SECRET_KEY in .env}
      LOGION_COOKIE_SECURE: ${LOGION_COOKIE_SECURE:-false}
      LOGION_LEGACY_REGISTRATION_ENABLED: ${LOGION_LEGACY_REGISTRATION_ENABLED:-true}
      LOGION_WEBAUTHN_RP_ID: ${LOGION_WEBAUTHN_RP_ID:-localhost}
      LOGION_WEBAUTHN_RP_NAME: ${LOGION_WEBAUTHN_RP_NAME:-Logion}
      LOGION_WEBAUTHN_ORIGINS: ${LOGION_WEBAUTHN_ORIGINS:-["http://localhost:3000"]}
      LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID: ${LOGION_TOTP_ACTIVE_ENCRYPTION_KEY_ID:-development-v1}
      LOGION_TOTP_ENCRYPTION_KEYS: ${LOGION_TOTP_ENCRYPTION_KEYS:?set LOGION_TOTP_ENCRYPTION_KEYS in .env}
      LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID: ${LOGION_EMAIL_DELIVERY_ACTIVE_ENCRYPTION_KEY_ID:-development-v1}
      LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS: ${LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS:?set LOGION_EMAIL_DELIVERY_ENCRYPTION_KEYS in .env}
      UVICORN_FORWARDED_ALLOW_IPS: ${LOGION_FORWARDED_ALLOW_IPS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]
    read_only: true
    tmpfs: [/tmp]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      LOGION_ENV: ${LOGION_ENV:-development}
      LOGION_VERSION: ${LOGION_VERSION:-0.1.0}
      LOGION_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-logion}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-logion}
      LOGION_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "logion_worker.health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [backend]
    read_only: true
    tmpfs: [/tmp]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      LOGION_PUBLIC_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [frontend, backend]
    read_only: true
    tmpfs: [/tmp]
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.29.6-alpine
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [frontend, backend]
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    restart: unless-stopped

  backup:
    build:
      context: infra/backup
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-logion}
      PGUSER: ${POSTGRES_USER:-logion}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      LOGION_BACKUP_RETENTION_DAYS: ${LOGION_BACKUP_RETENTION_DAYS:-14}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backup_data:/backups
      - attachments_data:/attachments:ro
    networks: [backend]
    read_only: true
    tmpfs: [/tmp]
    restart: unless-stopped

networks:
  frontend:
  backend:
    internal: true

volumes:
  postgres_data:
  redis_data:
  attachments_data:
  backup_data:
